<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effecti · Controle de Presença em Treinamentos</title>
<style>
  :root{
    --gulf-blue:#121d59;
    --midnight:#081128;
    --blizzard:#aaebf2;
    --merino:#f1ede1;
    --blizzard-soft:#e3f8fa;
    --line:#dcd5c4;
    --ok:#1f8a5a;
    --warn:#c98a1f;
    --danger:#b8423b;
    --text:#1c2230;
    --text-soft:#5a6072;
    --radius:10px;
    --shadow:0 1px 2px rgba(8,17,40,0.06), 0 6px 20px rgba(8,17,40,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background:var(--merino);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}

  /* ---- layout shell ---- */
  .app-shell{
    display:flex;
    min-height:100vh;
  }
  .sidebar{
    width:240px;
    flex-shrink:0;
    background:var(--gulf-blue);
    color:var(--merino);
    display:flex;
    flex-direction:column;
    padding:24px 0;
  }
  @media (max-width:880px){
    .app-shell{ flex-direction:column; }
    .sidebar{ width:100%; flex-direction:row; align-items:center; padding:14px 16px; gap:4px; overflow-x:auto; }
    .brand{ padding:0 16px 0 0; border-bottom:none; margin-bottom:0; flex-shrink:0; }
    .nav{ flex-direction:row; padding:0; gap:4px; }
    .nav-item{ white-space:nowrap; }
    .sidebar-footer{ display:none; }
  }
  .brand{
    padding:0 24px 24px 24px;
    border-bottom:1px solid rgba(241,237,225,0.12);
    margin-bottom:16px;
  }
  .brand-mark{
    font-size:20px;
    font-weight:700;
    letter-spacing:0.3px;
    color:var(--merino);
  }
  .brand-sub{
    font-size:11.5px;
    color:var(--blizzard);
    margin-top:4px;
    letter-spacing:0.4px;
    text-transform:uppercase;
  }
  .nav{
    display:flex;
    flex-direction:column;
    gap:2px;
    padding:0 12px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 12px;
    border-radius:8px;
    color:rgba(241,237,225,0.78);
    font-size:14px;
    cursor:pointer;
    border:none;
    background:none;
    text-align:left;
    font-family:inherit;
    transition:background 0.12s ease, color 0.12s ease;
  }
  .nav-item:hover{
    background:rgba(241,237,225,0.08);
    color:var(--merino);
  }
  .nav-item.active{
    background:var(--blizzard);
    color:var(--midnight);
    font-weight:600;
  }
  .nav-icon{
    width:18px;
    height:18px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .sidebar-footer{
    margin-top:auto;
    padding:16px 24px 4px 24px;
    font-size:11px;
    color:rgba(241,237,225,0.45);
    border-top:1px solid rgba(241,237,225,0.1);
  }

  .main{
    flex:1;
    min-width:0;
    width:100%;
    max-width:1320px;
    margin:0 auto;
    padding:32px 40px 56px 40px;
  }
  @media (max-width:880px){
    .main{ padding:20px 18px 40px 18px; }
  }
  @media (max-width:640px){
    .grid-4{ grid-template-columns:1fr 1fr; }
    .grid-3{ grid-template-columns:1fr; }
    .grid-2{ grid-template-columns:1fr; }
  }
  .page-header{
    margin-bottom:28px;
  }
  .page-title{
    font-size:24px;
    font-weight:700;
    color:var(--midnight);
    margin:0 0 4px 0;
  }
  .page-desc{
    font-size:14px;
    color:var(--text-soft);
    margin:0;
  }

  /* ---- cards / panels ---- */
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    width:100%;
    overflow-x:auto;
  }
  .card-pad{ padding:20px 22px; }
  .card-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    padding:16px 22px;
    border-bottom:1px solid var(--line);
  }
  .card-header h3{
    font-size:15px;
    margin:0;
    color:var(--midnight);
    font-weight:700;
  }
  .card-header .hint{
    font-size:12.5px;
    color:var(--text-soft);
    margin-top:2px;
  }

  .grid{
    display:grid;
    gap:18px;
  }
  .grid-4{ grid-template-columns:repeat(4,1fr); }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-2{ grid-template-columns:repeat(2,1fr); }
  @media (max-width:1100px){
    .grid-4{ grid-template-columns:repeat(2,1fr); }
    .grid-3{ grid-template-columns:repeat(2,1fr); }
  }

  /* ---- KPI tiles ---- */
  .kpi{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px 20px;
    box-shadow:var(--shadow);
  }
  .kpi-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--text-soft);
    font-weight:600;
    margin-bottom:8px;
  }
  .kpi-value{
    font-size:28px;
    font-weight:700;
    color:var(--gulf-blue);
    line-height:1.1;
  }
  .kpi-sub{
    font-size:12px;
    color:var(--text-soft);
    margin-top:6px;
  }

  /* ---- buttons ---- */
  .btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:9px 16px;
    border-radius:8px;
    font-size:13.5px;
    font-weight:600;
    border:1px solid transparent;
    cursor:pointer;
    font-family:inherit;
    transition:filter 0.12s ease, background 0.12s ease;
  }
  .btn:active{ filter:brightness(0.93); }
  .btn-primary{
    background:var(--gulf-blue);
    color:#fff;
  }
  .btn-primary:hover{ background:var(--midnight); }
  .btn-secondary{
    background:#fff;
    color:var(--gulf-blue);
    border:1px solid var(--gulf-blue);
  }
  .btn-secondary:hover{ background:var(--blizzard-soft); }
  .btn-ghost{
    background:transparent;
    color:var(--text-soft);
    border:1px solid var(--line);
  }
  .btn-ghost:hover{ background:var(--merino); }
  .btn-danger{
    background:#fff;
    color:var(--danger);
    border:1px solid var(--danger);
  }
  .btn-danger:hover{ background:#fbece9; }
  .btn-sm{ padding:6px 11px; font-size:12.5px; }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; }

  /* ---- form elements ---- */
  input[type=text], input[type=number], input[type=date], textarea, select{
    font-family:inherit;
    font-size:13.5px;
    padding:9px 11px;
    border:1px solid var(--line);
    border-radius:7px;
    color:var(--text);
    background:#fff;
    width:100%;
  }
  input:focus, textarea:focus, select:focus{
    outline:2px solid var(--blizzard);
    outline-offset:0px;
    border-color:var(--gulf-blue);
  }
  label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--midnight);
    margin-bottom:6px;
  }
  .field{ margin-bottom:14px; }
  textarea{ resize:vertical; min-height:110px; font-family:'SF Mono', Consolas, monospace; font-size:12.5px; line-height:1.5;}

  /* ---- tables ---- */
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th{
    text-align:left;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:var(--text-soft);
    font-weight:700;
    padding:10px 14px;
    border-bottom:2px solid var(--line);
    white-space:nowrap;
  }
  td{
    padding:11px 14px;
    border-bottom:1px solid var(--line);
    color:var(--text);
    vertical-align:middle;
  }
  tr:last-child td{ border-bottom:none; }
  tr.row-hover:hover{ background:var(--blizzard-soft); }

  /* ---- badges/status ---- */
  .badge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:3px 10px;
    border-radius:100px;
    font-size:12px;
    font-weight:600;
    white-space:nowrap;
  }
  .badge-ok{ background:#e3f3ea; color:var(--ok); }
  .badge-warn{ background:#fbf1de; color:var(--warn); }
  .badge-danger{ background:#fbe9e7; color:var(--danger); }
  .badge-neutral{ background:var(--blizzard-soft); color:var(--gulf-blue); }
  .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }

  /* ---- empty state ---- */
  .empty{
    text-align:center;
    padding:48px 24px;
    color:var(--text-soft);
  }
  .empty-icon{ font-size:32px; margin-bottom:10px; opacity:0.6; }
  .empty h4{ color:var(--midnight); margin:0 0 6px 0; font-size:15px; }
  .empty p{ font-size:13px; margin:0 0 16px 0; }

  /* ---- pill / score ring ---- */
  .score-ring{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:38px;
    height:38px;
    border-radius:50%;
    font-weight:700;
    font-size:13px;
    color:#fff;
  }

  /* ---- tabs ---- */
  .tabs{
    display:flex;
    gap:4px;
    border-bottom:1px solid var(--line);
    margin-bottom:20px;
  }
  .tab{
    padding:10px 16px;
    font-size:13.5px;
    font-weight:600;
    color:var(--text-soft);
    cursor:pointer;
    border:none;
    background:none;
    font-family:inherit;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  .tab.active{
    color:var(--gulf-blue);
    border-bottom-color:var(--gulf-blue);
  }
  .tab:hover{ color:var(--midnight); }

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(8,17,40,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .modal{
    background:#fff; border-radius:12px; width:100%; max-width:560px;
    max-height:88vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(8,17,40,0.3);
  }
  .modal-header{
    padding:18px 22px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-header h3{ margin:0; font-size:16px; color:var(--midnight); }
  .modal-body{ padding:20px 22px; }
  .modal-footer{
    padding:16px 22px; border-top:1px solid var(--line);
    display:flex; justify-content:flex-end; gap:10px;
  }
  .close-x{
    background:none; border:none; cursor:pointer; color:var(--text-soft);
    font-size:18px; padding:4px 8px; border-radius:6px; font-family:inherit;
  }
  .close-x:hover{ background:var(--merino); }

  .toast-wrap{
    position:fixed; bottom:24px; right:24px; z-index:200;
    display:flex; flex-direction:column; gap:8px;
  }
  .toast{
    background:var(--midnight); color:var(--merino);
    padding:12px 18px; border-radius:8px; font-size:13.5px;
    box-shadow:0 8px 24px rgba(0,0,0,0.25);
    display:flex; align-items:center; gap:8px;
    animation:toast-in 0.18s ease;
  }
  .toast.error{ background:var(--danger); }
  .toast.success{ background:var(--ok); }
  @keyframes toast-in{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .helper-text{ font-size:12px; color:var(--text-soft); margin-top:4px; }
  .divider{ height:1px; background:var(--line); margin:18px 0; border:none; }

  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{
    background:var(--blizzard-soft); color:var(--gulf-blue);
    border-radius:7px; padding:5px 10px; font-size:12.5px; font-weight:600;
    display:flex; align-items:center; gap:6px;
  }
  .chip button{
    background:none; border:none; cursor:pointer; color:var(--gulf-blue);
    font-size:13px; padding:0; line-height:1; opacity:0.6;
  }
  .chip button:hover{ opacity:1; }

  .search-input-wrap{ position:relative; max-width:320px; flex:1 1 200px; min-width:160px; }

  .bar-track{ background:var(--merino); border-radius:6px; height:8px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:6px; background:var(--gulf-blue); }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#cfc7b3; border-radius:6px; }
  ::-webkit-scrollbar-track{ background:transparent; }
</style>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* =========================================================
   PERSISTENCE LAYER — Google Apps Script API
   Cole a URL do seu Web App aqui após publicar o Apps Script:
   (Implantação > Implantar como app da Web > copiar URL)
   ========================================================= */
const APPS_SCRIPT_URL = (
  typeof window !== "undefined" && window.APPS_SCRIPT_URL
) || ""; // fallback vazio — será preenchido pela configuração abaixo

// Lê a URL salva no localStorage do navegador (configurada pelo admin)
function getSavedScriptUrl() {
  try { return localStorage.getItem("effecti_script_url") || ""; } catch(e) { return ""; }
}
function setSavedScriptUrl(url) {
  try { localStorage.setItem("effecti_script_url", url); } catch(e) {}
}
function getScriptUrl() {
  return getSavedScriptUrl() || APPS_SCRIPT_URL;
}

async function loadAll() {
  const url = getScriptUrl();
  if (!url) return null;
  const res = await fetch(url + "?action=readState", { method: "GET" });
  if (!res.ok) throw new Error("Erro HTTP " + res.status);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json.data;
}

async function saveAll(state) {
  const url = getScriptUrl();
  if (!url) return false;
  // Encode state as base64 to send via GET (avoids CORS preflight from POST)
  const json = JSON.stringify(state);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const res = await fetch(url + "?action=writeState&state=" + encodeURIComponent(b64), { method: "GET" });
  if (!res.ok) throw new Error("Erro HTTP " + res.status);
  const result = await res.json();
  if (result.error) throw new Error(result.error);
  return true;
}

async function checkWhoAmI() {
  const url = getScriptUrl();
  if (!url) return null;
  const res = await fetch(url + "?action=whoami");
  if (!res.ok) return null;
  const json = await res.json();
  return json.email || null;
}

/* =========================================================
   UTILITIES
   ========================================================= */
function uid(prefix) {
  return prefix + "_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function parseDurationToMinutes(raw) {
  // Accepts "90", "1:30", "1h30", "1h30m", "01:30:00" (HH:MM:SS), "9:16" (MM:SS)
  if (raw == null) return 0;
  const s = String(raw).trim().toLowerCase();
  if (s === "") return 0;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  let m = s.match(/^(\d+)\s*:\s*(\d{1,2})\s*:\s*(\d{1,2})$/);
  if (m) {
    // HH:MM:SS — e.g. exports from Google Meet / Zoom / Read.ai
    const h = parseInt(m[1], 10), mi = parseInt(m[2], 10), sec = parseInt(m[3], 10);
    return h * 60 + mi + sec / 60;
  }
  m = s.match(/^(\d+)\s*:\s*(\d{1,2})$/);
  if (m) {
    // HH:MM
    const h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
    return h * 60 + mi;
  }
  m = s.match(/^(\d+)\s*h(?:\s*(\d+)\s*m?)?$/);
  if (m) {
    const h = parseInt(m[1], 10), mi = m[2] ? parseInt(m[2], 10) : 0;
    return h * 60 + mi;
  }
  m = s.match(/^(\d+)\s*m(?:in)?$/);
  if (m) return parseInt(m[1], 10);
  const f = parseFloat(s.replace(",", "."));
  if (!isNaN(f)) return Math.round(f);
  return 0;
}

function minutesToHM(min) {
  const m = Math.round(min || 0);
  const h = Math.floor(m / 60);
  const mi = m % 60;
  if (h === 0) return `${mi}min`;
  if (mi === 0) return `${h}h`;
  return `${h}h${String(mi).padStart(2, "0")}`;
}

function formatDate(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  if (!y || !m || !d) return iso;
  return `${d}/${m}/${y}`;
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function normalizeName(name) {
  return (name || "").trim().replace(/\s+/g, " ");
}
function nameKey(name) {
  return normalizeName(name).toLowerCase();
}

// Strip accents for fuzzy comparisons (e.g. "João" vs "Joao").
function stripAccents(s) {
  return (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function nameTokens(name) {
  return stripAccents(nameKey(name))
    .split(" ")
    .filter(t => t.length > 0);
}

// Levenshtein distance, used to catch typos / minor spelling differences on a single token.
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1]
        ? dp[i - 1][j - 1]
        : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
}

// Similarity score between two full names, robust to:
// - case differences ("ANA" vs "ana")
// - accent differences ("Joao" vs "João")
// - middle names added/removed ("Candice Almeida" vs "Candice Ourique de Almeida")
// - small typos in a token ("Candice" vs "Candise")
// Returns a score from 0 (unrelated) to 1 (same person, high confidence).
function nameSimilarity(nameA, nameB) {
  const ka = nameKey(nameA), kb = nameKey(nameB);
  if (ka === kb) return 1;

  const tokensA = nameTokens(nameA);
  const tokensB = nameTokens(nameB);
  if (tokensA.length === 0 || tokensB.length === 0) return 0;

  // Ignore common Portuguese connector words when comparing tokens.
  const STOPWORDS = new Set(["de", "da", "do", "dos", "das", "e"]);
  const coreA = tokensA.filter(t => !STOPWORDS.has(t));
  const coreB = tokensB.filter(t => !STOPWORDS.has(t));
  if (coreA.length === 0 || coreB.length === 0) return 0;

  // First name must match exactly (or be a very close typo) — this avoids matching
  // unrelated people who happen to share a common surname.
  const firstA = coreA[0], firstB = coreB[0];
  const firstNameClose = firstA === firstB ||
    (Math.min(firstA.length, firstB.length) >= 4 && levenshtein(firstA, firstB) <= 1);
  if (!firstNameClose) return 0;

  // Count how many tokens of the shorter name appear (exactly, or as a close typo) in the longer name.
  const [shorter, longer] = coreA.length <= coreB.length ? [coreA, coreB] : [coreB, coreA];
  let matched = 0;
  const usedLonger = new Set();
  for (const tok of shorter) {
    let bestIdx = -1, bestDist = Infinity;
    longer.forEach((t2, idx) => {
      if (usedLonger.has(idx)) return;
      const d = tok === t2 ? 0 : levenshtein(tok, t2);
      const maxLen = Math.max(tok.length, t2.length);
      const allowedDist = maxLen >= 5 ? 1 : 0;
      if (d <= allowedDist && d < bestDist) { bestDist = d; bestIdx = idx; }
    });
    if (bestIdx !== -1) { matched++; usedLonger.add(bestIdx); }
  }

  // All tokens of the shorter name must be found in the longer one (e.g. every token in
  // "Candice Almeida" appears in "Candice Ourique de Almeida"). Extra tokens in the longer
  // name (middle names) are allowed and don't penalize the score.
  if (matched < shorter.length) return 0;

  // High confidence when the first name matched and every short-name token was found.
  return 0.75 + 0.25 * (matched / shorter.length);
}

// Finds existing employees that are a likely (but not certain) match for `name`,
// sorted by similarity. Exact matches (case/space-insensitive) are excluded —
// those are handled separately as a direct hit, not a "suggestion".
function findSimilarEmployees(name, employees, minScore = 0.75) {
  const k = nameKey(name);
  return employees
    .map(emp => ({ employee: emp, score: nameSimilarity(name, emp.name) }))
    .filter(x => x.score >= minScore && nameKey(x.employee.name) !== k)
    .sort((a, b) => b.score - a.score);
}

/* =========================================================
   EXPORT HELPERS — period filtering, CSV download, PDF generation
   ========================================================= */
function isWithinPeriod(dateISO, startISO, endISO) {
  if (!dateISO) return false;
  if (startISO && dateISO < startISO) return false;
  if (endISO && dateISO > endISO) return false;
  return true;
}

function periodLabel(startISO, endISO) {
  if (!startISO && !endISO) return "Todo o período";
  if (startISO && endISO) return `${formatDate(startISO)} a ${formatDate(endISO)}`;
  if (startISO) return `A partir de ${formatDate(startISO)}`;
  return `Até ${formatDate(endISO)}`;
}

// Builds a CSV string from an array of {label, value} column defs and row objects,
// quoting fields that contain commas, quotes, or newlines.
function buildCSV(columns, rows) {
  function escapeCell(v) {
    const s = v == null ? "" : String(v);
    if (/[",\n;]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  const header = columns.map(c => escapeCell(c.label)).join(",");
  const lines = rows.map(row => columns.map(c => escapeCell(c.value(row))).join(","));
  return [header, ...lines].join("\r\n");
}

function downloadCSV(filename, csvContent) {
  // Prepend BOM so accented characters (ã, ç, é...) open correctly in Excel.
  const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function startEffectiPDF(title, subtitle) {
  if (!window.jspdf || !window.jspdf.jsPDF) {

  }
  const pageWidth = doc.internal.pageSize.getWidth();

  doc.setFillColor(...EFFECTI_PDF_COLORS.gulfBlue);

function finishEffectiPDF(doc, filename) {
  const pageCount = doc.internal.getNumberOfPages();
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  for (let i = 1; i <= pageCount; i++) {

    doc.setTextColor(...EFFECTI_PDF_COLORS.textSoft);
    doc.text(`Gerado em ${new Date().toLocaleDateString("pt-BR")} · Página ${i} de ${pageCount}`, 40, pageHeight - 24);
  }
  doc.save(filename);
}

function pdfAutoTable(doc, startY, head, body) {
  doc.autoTable({
    startY,
    head: [head],
    body,

    alternateRowStyles: { fillColor: [248, 246, 240] },
  });
  return doc.lastAutoTable.finalY;
}

// Minimal, dependency-free CSV parser (handles quoted fields, embedded commas/newlines,
// doubled-quote escaping, \r\n / \n line endings, and a leading UTF-8 BOM).
function parseCSVText(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field); field = "";
      } else if (c === "\r") {
        // ignore; \n (or end) will terminate the row
      } else if (c === "\n") {
        row.push(field); field = "";
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
  }
  // flush last field/row if the file doesn't end with a newline
  if (field !== "" || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => (c || "").trim() !== ""));
}

   ========================================================= */
function App() {
  const [state, setState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [page, setPage] = useState("dashboard");
  const [toasts, setToasts] = useState([]);
  const [authError, setAuthError] = useState(""); // 403 / domain error
  const [netError, setNetError] = useState("");   // save failures
  const [userEmail, setUserEmail] = useState("");
  const [scriptUrl, setScriptUrl] = useState(getScriptUrl());
  const [showUrlSetup, setShowUrlSetup] = useState(!getScriptUrl());
  const [saving, setSaving] = useState(false);
  const saveTimer = useRef(null);
  const pendingSave = useRef(null); // latest state waiting to be saved

  // Initial load
  useEffect(() => {
    if (!getScriptUrl()) { setLoaded(true); return; }
    (async () => {
      try {
        const data = await loadAll();
        setState(data || emptyState());
        // fetch who is logged in
        const email = await checkWhoAmI();
        if (email) setUserEmail(email);
      } catch (e) {
        if (e.message && e.message.includes("Acesso negado")) {
          setAuthError(e.message);
        } else {
          setNetError("Não foi possível conectar ao servidor. Verifique a URL do Apps Script nas configurações.");
          setState(emptyState());
        }
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  // Debounced auto-save whenever state changes
  useEffect(() => {
    if (!loaded || !state || !getScriptUrl()) return;
    pendingSave.current = state;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const toSave = pendingSave.current;
      if (!toSave) return;
      setSaving(true);
      try {
        await saveAll(toSave);
        setNetError("");
      } catch (e) {
        setNetError("Erro ao salvar alterações: " + e.message);
      } finally {
        setSaving(false);
      }
    }, 800);
    return () => clearTimeout(saveTimer.current);
  }, [state, loaded]);

  const pushToast = useCallback((message, type = "default") => {
    const id = uid("toast");
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);

  function handleUrlSave(url) {
    setSavedScriptUrl(url.trim());
    setScriptUrl(url.trim());
    setShowUrlSetup(false);
    setLoaded(false);
    setState(null);
    setAuthError("");
    setNetError("");
    // reload
    setTimeout(() => window.location.reload(), 100);
  }

  if (!loaded) {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:12, color:"#5a6072", fontSize:14 }}>
        <div style={{ width:32, height:32, border:"3px solid #aaebf2", borderTopColor:"#121d59", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}></div>
        Conectando ao servidor…
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  if (authError) {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:16, padding:32, textAlign:"center" }}>
        <div style={{ fontSize:32 }}>🔒</div>
        <h2 style={{ color:"#081128", margin:0 }}>Acesso não autorizado</h2>
        <p style={{ color:"#5a6072", maxWidth:420, margin:0 }}>{authError}</p>
        <p style={{ color:"#5a6072", fontSize:13, maxWidth:420, margin:0 }}>Certifique-se de estar logado com sua conta <strong>@effecti.com.br</strong> no Google e tente recarregar a página.</p>
        <button className="btn btn-primary" onClick={() => window.location.reload()}>Recarregar</button>
      </div>
    );
  }

  if (showUrlSetup) {
    return <UrlSetupScreen onSave={handleUrlSave} />;
  }

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={setPage} userEmail={userEmail} saving={saving} onConfigUrl={() => setShowUrlSetup(true)} />
      <div className="main">
        {netError && (
          <div style={{ background:"#fbe9e7", color:"#b8423b", borderRadius:8, padding:"10px 16px", fontSize:13, marginBottom:20, display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
            <span>{netError}</span>
            <button className="btn btn-ghost btn-sm" onClick={() => setNetError("")}>✕</button>
          </div>
        )}
        {page === "dashboard"  && <DashboardPage  state={state} />}
        {page === "employees"  && <EmployeesPage  state={state} setState={setState} pushToast={pushToast} />}
        {page === "trainings"  && <TrainingsPage  state={state} setState={setState} pushToast={pushToast} />}
        {page === "attendance" && <AttendancePage state={state} setState={setState} pushToast={pushToast} />}
        {page === "reports"    && <ReportsPage    state={state} />}
        {page === "settings"   && <SettingsPage   state={state} setState={setState} pushToast={pushToast} />}
      </div>
      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className={"toast " + (t.type==="error"?"error":t.type==="success"?"success":"")}>
            {t.message}
          </div>
        ))}
      </div>
    </div>
  );
}

function EmployeesPage({ state, setState, pushToast }) {
  const [showImport, setShowImport] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null); // employee being edited
  const [query, setQuery] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [pendingImport, setPendingImport] = useState(null); // { toAdd, possibleDuplicates, exactDuplicates }
  const [mergeTarget, setMergeTarget] = useState(null); // employee being merged into another

  const employees = state.employees;

  const filtered = useMemo(() => {
    const q = nameKey(query);
    return employees
      .filter(e => !q || nameKey(e.name).includes(q))
      .sort((a, b) => a.name.localeCompare(b.name, "pt-BR"));
  }, [employees, query]);

  function addEmployee(name) {
    const clean = normalizeName(name);
    if (!clean) return;
    if (employees.some(e => nameKey(e.name) === nameKey(clean))) {
      pushToast("Já existe um colaborador com esse nome.", "error");
      return;
    }
    setState(s => ({ ...s, employees: [...s.employees, { id: uid("emp"), name: clean, active: true }] }));
    pushToast("Colaborador adicionado.", "success");
    setShowAdd(false);
  }

  function updateEmployee(id, name) {
    const clean = normalizeName(name);
    if (!clean) return;
    if (employees.some(e => e.id !== id && nameKey(e.name) === nameKey(clean))) {
      pushToast("Já existe um colaborador com esse nome.", "error");
      return;
    }
    setState(s => ({ ...s, employees: s.employees.map(e => e.id === id ? { ...e, name: clean } : e) }));
    pushToast("Nome atualizado.", "success");
    setEditing(null);
  }

  function removeEmployee(id) {
    setState(s => ({
      ...s,
      employees: s.employees.filter(e => e.id !== id),
      attendances: s.attendances.filter(a => a.employeeId !== id),
    }));
    pushToast("Colaborador removido.", "success");
    setConfirmDelete(null);
  }

  function importNames(rawNames) {
    const existingKeys = new Set(employees.map(e => nameKey(e.name)));
    const toAdd = [];
    const seen = new Set();
    const possibleDuplicates = [];
    let exactDuplicates = 0;
    rawNames.forEach(n => {
      const clean = normalizeName(n);
      if (!clean) return;
      const k = nameKey(clean);
      if (existingKeys.has(k) || seen.has(k)) { exactDuplicates++; return; }
      seen.add(k);
      const similar = findSimilarEmployees(clean, employees);
      if (similar.length > 0) {
        possibleDuplicates.push({ name: clean, suggestion: similar[0].employee });
      }
      toAdd.push({ id: uid("emp"), name: clean, active: true });
    });
    if (toAdd.length === 0) {
      pushToast(exactDuplicates > 0 ? "Todos os nomes já existem na base." : "Nenhum nome válido encontrado.", "error");
      return;
    }
    if (possibleDuplicates.length > 0) {
      setPendingImport({ toAdd, possibleDuplicates, exactDuplicates });
      return;
    }
    setState(s => ({ ...s, employees: [...s.employees, ...toAdd] }));
    pushToast(`${toAdd.length} colaborador(es) importado(s)` + (exactDuplicates ? `, ${exactDuplicates} duplicado(s) ignorado(s).` : "."), "success");
    setShowImport(false);
  }

  function finalizeImport(excludeNames) {
    const { toAdd, exactDuplicates } = pendingImport;
    const finalAdd = toAdd.filter(e => !excludeNames.has(nameKey(e.name)));
    setState(s => ({ ...s, employees: [...s.employees, ...finalAdd] }));
    const skipped = toAdd.length - finalAdd.length;
    pushToast(
      `${finalAdd.length} colaborador(es) importado(s)` +
      (skipped ? `, ${skipped} possível(eis) duplicata(s) ignorada(s)` : "") +
      (exactDuplicates ? `, ${exactDuplicates} já existente(s) ignorado(s).` : "."),
      "success"
    );
    setPendingImport(null);
    setShowImport(false);
  }

  function mergeEmployees(keepId, mergeId) {
    if (keepId === mergeId) return;
    setState(s => {
      // Re-point the merged employee's attendance records to the one being kept.
      // If both employees already have a record for the same training, keep only
      // the one with more time present (the other is a redundant duplicate).
      const keepTrainingIds = new Set(
        s.attendances.filter(a => a.employeeId === keepId).map(a => a.trainingId)
      );
      const nextAttendances = [];
      s.attendances.forEach(a => {
        if (a.employeeId !== mergeId) { nextAttendances.push(a); return; }
        if (keepTrainingIds.has(a.trainingId)) {
          // Conflict: same training already has a record for the kept employee.
          const existing = s.attendances.find(x => x.employeeId === keepId && x.trainingId === a.trainingId);
          if (existing && a.minutesPresent > existing.minutesPresent) {
            // Replace the kept record's time with the higher one, drop this duplicate.
            existing._betterMinutes = a.minutesPresent;
            existing._betterStatus = a.status;
            existing._betterJustified = a.justified;
          }
          return; // drop the merged-employee duplicate row either way
        }
        nextAttendances.push({ ...a, employeeId: keepId });
      });
      const finalAttendances = nextAttendances.map(a => {
        if (a._betterMinutes != null) {
          const { _betterMinutes, _betterStatus, _betterJustified, ...rest } = a;
          return { ...rest, minutesPresent: _betterMinutes, status: _betterStatus, justified: _betterJustified };
        }
        return a;
      });
      return {
        ...s,
        employees: s.employees.filter(e => e.id !== mergeId),
        attendances: finalAttendances,
      };
    });
    pushToast("Colaboradores unificados.", "success");
  }

  return (
    <div>
      <div className="page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12 }}>
        <div>
          <h1 className="page-title">Colaboradores</h1>
          <p className="page-desc">Base de nomes usada para vincular presenças em treinamentos.</p>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn btn-secondary" onClick={() => setShowImport(true)}>Importar lista</button>
          <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ Adicionar colaborador</button>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div>
            <h3>{employees.length} colaborador{employees.length !== 1 ? "es" : ""} na base</h3>
          </div>
          <div className="search-input-wrap">
            <input type="text" placeholder="Buscar por nome…" value={query} onChange={e => setQuery(e.target.value)} />
          </div>
        </div>
        {filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">◎</div>
            <h4>{employees.length === 0 ? "Nenhum colaborador cadastrado" : "Nenhum resultado"}</h4>
            <p>{employees.length === 0 ? "Importe uma lista ou adicione manualmente para começar." : "Tente outro termo de busca."}</p>
            {employees.length === 0 && (
              <button className="btn btn-primary" onClick={() => setShowImport(true)}>Importar lista</button>
            )}
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Nome</th><th style={{ width: 280 }}>Ações</th></tr>
            </thead>
            <tbody>
              {filtered.map(emp => {
                const similar = findSimilarEmployees(emp.name, employees);
                return (
                  <tr key={emp.id} className="row-hover">
                    <td>
                      {emp.name}
                      {similar.length > 0 && (
                        <span
                          className="badge badge-warn"
                          style={{ marginLeft: 8 }}
                          title={`Possível duplicata de: ${similar.map(s => s.employee.name).join(", ")}`}
                        >
                          possível duplicata
                        </span>
                      )}
                    </td>
                    <td>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button className="btn btn-ghost btn-sm" onClick={() => setEditing(emp)}>Editar</button>
                        {similar.length > 0 && (
                          <button className="btn btn-secondary btn-sm" onClick={() => setMergeTarget(emp)}>Unificar</button>
                        )}
                        <button className="btn btn-danger btn-sm" onClick={() => setConfirmDelete(emp)}>Remover</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {showAdd && (
        <AddEmployeeModal onClose={() => setShowAdd(false)} onSave={addEmployee} />
      )}
      {editing && (
        <EditEmployeeModal employee={editing} onClose={() => setEditing(null)} onSave={updateEmployee} />
      )}
      {showImport && (
        <ImportEmployeesModal onClose={() => setShowImport(false)} onImport={importNames} />
      )}
      {pendingImport && (
        <ImportDuplicatesModal
          pendingImport={pendingImport}
          onCancel={() => setPendingImport(null)}
          onConfirm={finalizeImport}
        />
      )}
      {mergeTarget && (
        <MergeEmployeeModal
          employee={mergeTarget}
          employees={employees}
          onClose={() => setMergeTarget(null)}
          onMerge={mergeEmployees}
        />
      )}
      {confirmDelete && (
        <ConfirmModal
          title="Remover colaborador"
          message={`Remover "${confirmDelete.name}"? Os registros de presença associados também serão removidos. Esta ação não pode ser desfeita.`}
          confirmLabel="Remover"
          danger
          onCancel={() => setConfirmDelete(null)}
          onConfirm={() => removeEmployee(confirmDelete.id)}
        />
      )}
    </div>
  );
}

function ImportEmployeesModal({ onClose, onImport }) {
  const [raw, setRaw] = useState("");
  const [fileName, setFileName] = useState("");
  const fileRef = useRef(null);

  function handleFile(file) {
    if (!file) return;
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = () => {
      const allRows = parseCSVText(String(reader.result));
      const names = allRows
        .map(row => row[0])
        .map(v => (v || "").toString())
        .filter(v => v.trim() !== "");
      // drop an obvious header like "nome" / "name"
      const cleaned = names.filter((n, i) => !(i === 0 && /^(nome|name|colaborador)s?$/i.test(n.trim())));
      setRaw(cleaned.join("\n"));
    };
    reader.readAsText(file, "UTF-8");
  }

  function parseAndImport() {
    const names = raw.split("\n").map(s => s.trim()).filter(Boolean);
    onImport(names);
  }

  return (
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ maxWidth: 560 }}>
        <div className="modal-header">
          <h3>Importar lista de colaboradores</h3>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>Arquivo CSV ou TXT (um nome por linha)</label>
            <input
              ref={fileRef} type="file" accept=".csv,.txt"
              onChange={e => handleFile(e.target.files[0])}
            />
            {fileName && <div className="helper-text">Arquivo carregado: {fileName}</div>}
          </div>
          <div style={{ textAlign: "center", color: "#8a8f9c", fontSize: 12, margin: "10px 0" }}>— ou cole a lista abaixo —</div>
          <div className="field">
            <label>Nomes (um por linha)</label>
            <textarea
              value={raw} onChange={e => setRaw(e.target.value)}
              placeholder={"Ana Beatriz Souza\nCarlos Eduardo Lima\nFernanda Ribeiro"}
            />
            <div className="helper-text">{raw.split("\n").filter(s => s.trim()).length} nome(s) detectado(s)</div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={parseAndImport} disabled={!raw.trim()}>Importar</button>
        </div>
      </div>
    </div>
  );
}

function ImportDuplicatesModal({ pendingImport, onCancel, onConfirm }) {
  const { possibleDuplicates, toAdd } = pendingImport;
  const dupKeys = new Set(possibleDuplicates.map(d => nameKey(d.name)));
  const [excluded, setExcluded] = useState(() => new Set(dupKeys)); // by default, don't create likely duplicates

  function toggle(name) {
    const k = nameKey(name);
    setExcluded(prev => {
      const next = new Set(prev);
      if (next.has(k)) next.delete(k); else next.add(k);
      return next;
    });
  }

  const willImport = toAdd.length - excluded.size;

  return (
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" style={{ maxWidth: 560 }}>
        <div className="modal-header">
          <h3>Possíveis duplicatas encontradas</h3>
          <button className="close-x" onClick={onCancel}>✕</button>
        </div>
        <div className="modal-body">
          <p style={{ fontSize: 13.5, color: "var(--text-soft)", marginTop: 0 }}>
            Os nomes abaixo parecem corresponder a colaboradores já cadastrados (ex: com nome do meio adicionado ou pequena variação de grafia). Desmarque para não importá-los como novos.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 320, overflowY: "auto" }}>
            {possibleDuplicates.map((d, i) => {
              const isExcluded = excluded.has(nameKey(d.name));
              return (
                <div key={i} style={{ border: "1px solid var(--line)", borderRadius: 8, padding: "10px 12px", display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <input type="checkbox" checked={!isExcluded} onChange={() => toggle(d.name)} style={{ width: "auto", marginTop: 3 }} />
                  <div style={{ fontSize: 13.5 }}>
                    <div><strong>{d.name}</strong> {!isExcluded && <span className="helper-text" style={{ display: "inline" }}>(será importado como novo)</span>}</div>
                    <div className="helper-text">Parecido com colaborador já cadastrado: {d.suggestion.name}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onCancel}>Cancelar importação</button>
          <button className="btn btn-primary" onClick={() => onConfirm(excluded)}>Importar {willImport} colaborador{willImport !== 1 ? "es" : ""}</button>
        </div>
      </div>
    </div>
  );
}

function MergeEmployeeModal({ employee, employees, onClose, onMerge }) {
  const suggestions = useMemo(() => findSimilarEmployees(employee.name, employees), [employee, employees]);
  const [targetId, setTargetId] = useState(suggestions[0]?.employee.id || "");

            <strong>{employee.name}</strong> será removido e todos os registros de presença associados a ele passarão para o colaborador escolhido abaixo. Esta ação não pode ser desfeita.
          </p>
          <div className="field">
            <label>Manter como</label>
            <select value={targetId} onChange={e => setTargetId(e.target.value)}>
              <option value="">Selecione um colaborador…</option>

              ))}

        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" disabled={!targetId} onClick={() => { onMerge(targetId, employee.id); onClose(); }}>

        </div>

    </div>
  );
}

/* =========================================================
   EXPORT REPORT MODAL — período + 3 relatórios em CSV/PDF
   ========================================================= */
function ExportReportModal({ state, onClose }) {
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  const [busy, setBusy] = useState(""); // which export is currently generating, for button feedback
  const [exportError, setExportError] = useState("");

  const { employees, trainings, attendances } = state;

  const trainingsById = useMemo(() => {
    const m = new Map();
    trainings.forEach(t => m.set(t.id, t));
    return m;
  }, [trainings]);

  const trainingsInPeriod = useMemo(
    () => trainings.filter(t => isWithinPeriod(t.date, startDate, endDate))
                   .sort((a, b) => (a.date || "").localeCompare(b.date || "")),
    [trainings, startDate, endDate]
  );
  const trainingIdsInPeriod = useMemo(() => new Set(trainingsInPeriod.map(t => t.id)), [trainingsInPeriod]);
  const attendancesInPeriod = useMemo(
    () => attendances.filter(a => trainingIdsInPeriod.has(a.trainingId)),
    [attendances, trainingIdsInPeriod]
  );

  const label = periodLabel(startDate, endDate);
  const today = todayISO();

  function withBusy(key, fn) {
    setExportError("");
    setBusy(key);
    setTimeout(() => {
      try {
        fn();
      } catch (err) {
        console.error("Erro ao exportar relatório:", err);
        setExportError(err.message || "Não foi possível gerar o relatório. Tente novamente.");
      } finally {
        setBusy("");
      }
    }, 30); // tiny delay so the button's "Gerando…" state actually paints before heavy work
  }

  /* ---------- Report 1: Treinamentos realizados ---------- */
  function trainingsRows() {
    return trainingsInPeriod.map(t => {
      const atts = attendances.filter(a => a.trainingId === t.id);
      const presentes = atts.filter(a => a.status === "Presente").length;
      const ausentes = atts.filter(a => a.status === "Ausente" && !a.justified).length;
      const justificados = atts.filter(a => a.status === "Ausente" && a.justified).length;
      const totalMin = atts.filter(a => a.status === "Presente").reduce((s, a) => s + a.minutesPresent, 0);
      const rate = atts.length > 0 ? Math.round((presentes / atts.length) * 100) : 0;
      return { training: t, total: atts.length, presentes, ausentes, justificados, totalMin, rate };
    });
  }

  function exportTrainingsCSV() {
    const rows = trainingsRows();
    const csv = buildCSV([
      { label: "Treinamento", value: r => r.training.name },
      { label: "Data", value: r => formatDate(r.training.date) },
      { label: "Duração", value: r => minutesToHM(r.training.durationMin) },
      { label: "Participantes", value: r => r.total },
      { label: "Presentes", value: r => r.presentes },
      { label: "Ausentes", value: r => r.ausentes },
      { label: "Ausentes Justificados", value: r => r.justificados },
      { label: "Taxa de Presença (%)", value: r => r.rate },
      { label: "Horas Totais (presenças)", value: r => minutesToHM(r.totalMin) },
    ], rows);
    downloadCSV(`treinamentos-realizados_${today}.csv`, csv);
  }

  function exportTrainingsPDF() {
    const rows = trainingsRows();
    const { doc, startY } = startEffectiPDF("Treinamentos Realizados", `Período: ${label}`);
    let y = startY;
    const totalHoras = rows.reduce((s, r) => s + r.totalMin, 0);
    doc.setFontSize(10);
    doc.setTextColor(...EFFECTI_PDF_COLORS.textSoft);
    doc.text(`${rows.length} treinamento(s) · ${minutesToHM(totalHoras)} de horas totais presenciadas`, 40, y);
    y += 16;
    pdfAutoTable(doc, y, ["Treinamento", "Data", "Duração", "Particip.", "Presentes", "Ausentes", "Justific.", "Taxa", "Horas"],
      rows.map(r => [
        r.training.name, formatDate(r.training.date), minutesToHM(r.training.durationMin),
        String(r.total), String(r.presentes), String(r.ausentes), String(r.justificados),
        `${r.rate}%`, minutesToHM(r.totalMin),
      ])
    );
    if (rows.length === 0) {
      doc.setFontSize(10);
      doc.text("Nenhum treinamento encontrado no período selecionado.", 40, y + 20);
    }
    finishEffectiPDF(doc, `treinamentos-realizados_${today}.pdf`);
  }

  /* ---------- Report 2: Visão geral dos indicadores ---------- */
  function overviewData() {
    const totalMin = attendancesInPeriod.filter(a => a.status === "Presente").reduce((s, a) => s + a.minutesPresent, 0);
    const presentesCount = attendancesInPeriod.filter(a => a.status === "Presente").length;
    const ausentesCount = attendancesInPeriod.filter(a => a.status === "Ausente" && !a.justified).length;
    const justificadosCount = attendancesInPeriod.filter(a => a.status === "Ausente" && a.justified).length;
    const employeeIdsInPeriod = new Set(attendancesInPeriod.map(a => a.employeeId));
    const scores = [...employeeIdsInPeriod]
      .map(id => computePresenceScore(id, attendancesInPeriod))
      .filter(s => s != null);
    const avgScore = scores.length > 0 ? scores.reduce((s, v) => s + v, 0) / scores.length : null;
    return {
      totalTrainings: trainingsInPeriod.length,
      totalEmployees: employeeIdsInPeriod.size,
      totalMin, presentesCount, ausentesCount, justificadosCount, avgScore,
    };
  }

  function exportOverviewCSV() {
    const d = overviewData();
    const csv = buildCSV(
      [{ label: "Indicador", value: r => r.k }, { label: "Valor", value: r => r.v }],
      [
        { k: "Período", v: label },
        { k: "Treinamentos no período", v: d.totalTrainings },
        { k: "Colaboradores com registros no período", v: d.totalEmployees },
        { k: "Total de horas treinadas", v: minutesToHM(d.totalMin) },
        { k: "Registros Presente", v: d.presentesCount },
        { k: "Registros Ausente", v: d.ausentesCount },
        { k: "Registros Ausente Justificado", v: d.justificadosCount },
        { k: "Indicador médio de presença (0-5)", v: d.avgScore != null ? d.avgScore.toFixed(1) : "—" },
      ]
    );
    downloadCSV(`visao-geral-indicadores_${today}.csv`, csv);
  }

  function exportOverviewPDF() {
    const d = overviewData();
    const { doc, startY } = startEffectiPDF("Visão Geral dos Indicadores", `Período: ${label}`);
    let y = startY;
    pdfAutoTable(doc, y, ["Indicador", "Valor"], [
      ["Treinamentos no período", String(d.totalTrainings)],
      ["Colaboradores com registros no período", String(d.totalEmployees)],
      ["Total de horas treinadas", minutesToHM(d.totalMin)],
      ["Registros Presente", String(d.presentesCount)],
      ["Registros Ausente", String(d.ausentesCount)],
      ["Registros Ausente Justificado", String(d.justificadosCount)],
      ["Indicador médio de presença (0-5)", d.avgScore != null ? d.avgScore.toFixed(1) : "—"],
    ]);
    finishEffectiPDF(doc, `visao-geral-indicadores_${today}.pdf`);
  }

  /* ---------- Report 3: Indicador de presença por colaborador ---------- */
  function byEmployeeRows() {
    return employees.map(e => {
      const mine = attendancesInPeriod.filter(a => a.employeeId === e.id);
      const presentes = mine.filter(a => a.status === "Presente").length;
      const ausentes = mine.filter(a => a.status === "Ausente" && !a.justified).length;
      const justificados = mine.filter(a => a.status === "Ausente" && a.justified).length;
      const totalMin = mine.filter(a => a.status === "Presente").reduce((s, a) => s + a.minutesPresent, 0);
      const score = computePresenceScore(e.id, mine);
      const avgParticipation = averageParticipationPct(e.id, mine, trainingsById);
      return { employee: e, total: mine.length, presentes, ausentes, justificados, totalMin, score, avgParticipation };
    }).filter(r => r.total > 0); // only employees with activity in the selected period
  }

  function exportByEmployeeCSV() {
    const rows = byEmployeeRows();
    const csv = buildCSV([
      { label: "Colaborador", value: r => r.employee.name },
      { label: "Treinamentos no Período", value: r => r.total },
      { label: "Presentes", value: r => r.presentes },
      { label: "Ausentes", value: r => r.ausentes },
      { label: "Ausentes Justificados", value: r => r.justificados },
      { label: "Horas Treinadas", value: r => minutesToHM(r.totalMin) },
      { label: "Indicador de Presença (0-5)", value: r => r.score != null ? r.score.toFixed(1) : "" },
      { label: "Média de Participação (%)", value: r => r.avgParticipation != null ? Math.round(r.avgParticipation) : "" },
    ], rows);
    downloadCSV(`presenca-por-colaborador_${today}.csv`, csv);
  }

  function exportByEmployeePDF() {
    const rows = byEmployeeRows();
    const { doc, startY } = startEffectiPDF("Indicador de Presença por Colaborador", `Período: ${label}`);
    let y = startY;
    doc.setFontSize(10);
    doc.setTextColor(...EFFECTI_PDF_COLORS.textSoft);
    doc.text(`${rows.length} colaborador(es) com registros no período`, 40, y);
    y += 16;
    pdfAutoTable(doc, y, ["Colaborador", "Treinam.", "Presentes", "Ausentes", "Justific.", "Horas", "Indicador (0-5)", "Média Particip."],
      rows.map(r => [
        r.employee.name, String(r.total), String(r.presentes), String(r.ausentes), String(r.justificados),
        minutesToHM(r.totalMin),
        r.score != null ? r.score.toFixed(1) : "—",
        r.avgParticipation != null ? `${Math.round(r.avgParticipation)}%` : "—",
      ])
    );
    if (rows.length === 0) {
      doc.setFontSize(10);
      doc.text("Nenhum colaborador com registros no período selecionado.", 40, y + 20);
    }
    finishEffectiPDF(doc, `presenca-por-colaborador_${today}.pdf`);
  }

  const reportDefs = [
    {
      key: "trainings",
      title: "Treinamentos realizados",
      desc: "Lista de treinamentos no período, com participação, status e horas totais.",
      csv: exportTrainingsCSV, pdf: exportTrainingsPDF,
      count: trainingsInPeriod.length, countLabel: "treinamento(s)",
    },
    {
      key: "overview",
      title: "Visão geral dos indicadores",
      desc: "Resumo agregado: total de treinamentos, colaboradores, horas e indicador médio da equipe.",
      csv: exportOverviewCSV, pdf: exportOverviewPDF,
      count: null, countLabel: "",
    },
    {
      key: "byEmployee",
      title: "Indicador de presença por colaborador",
      desc: "Presenças, ausências, indicador (0-5) e média de participação por colaborador.",
      csv: exportByEmployeeCSV, pdf: exportByEmployeePDF,
      count: byEmployeeRows().length, countLabel: "colaborador(es) com registros",
    },
  ];

  return (
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ maxWidth: 620 }}>
        <div className="modal-header">

        </div>

            </div>
            <div className="field">
              <label>Data fim</label>
              <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} min={startDate || undefined} />

          {(startDate || endDate) && (

                  <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                    <button className="btn btn-secondary btn-sm" disabled={busy === r.key + "csv"} onClick={() => withBusy(r.key + "csv", r.csv)}>
                      {busy === r.key + "csv" ? "Gerando…" : "CSV"}
                    </button>
                    <button className="btn btn-primary btn-sm" disabled={busy === r.key + "pdf"} onClick={() => withBusy(r.key + "pdf", r.pdf)}>
                      {busy === r.key + "pdf" ? "Gerando…" : "PDF"}
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   CORE CALCULATION HELPERS (shared across pages)
   ========================================================= */
function computeStatus(minutesPresent, durationMin, thresholdPct) {
  if (durationMin <= 0) return "Ausente";
  const pct = (minutesPresent / durationMin) * 100;
  return pct >= thresholdPct ? "Presente" : "Ausente";
}

function effectiveStatus(att) {
  // att.status: "Presente" | "Ausente"; att.justified: bool (only relevant when Ausente)
  if (att.status === "Ausente" && att.justified) return "Ausente Justificado";
  return att.status;
}

function statusBadgeClass(effStatus) {
  if (effStatus === "Presente") return "badge-ok";
  if (effStatus === "Ausente Justificado") return "badge-warn";
  return "badge-danger";
}

// Presence score 0-5 per employee across all trainings they were expected to attend.
// Formula (simple, as specified): (presencas) / (total de treinamentos) * 5
// "Ausente Justificado" does not count as presença, but we surface it distinctly in detail views.
function computePresenceScore(employeeId, attendances) {
  const mine = attendances.filter(a => a.employeeId === employeeId);
  if (mine.length === 0) return null;
  const presentes = mine.filter(a => a.status === "Presente").length;
  return Math.round((presentes / mine.length) * 5 * 10) / 10;
}

function scoreColor(score) {
  if (score == null) return "#9aa0ad";
  if (score >= 4) return "#1f8a5a";
  if (score >= 2.5) return "#c98a1f";
  return "#b8423b";
}

function totalMinutesForEmployee(employeeId, attendances) {
  return attendances
    .filter(a => a.employeeId === employeeId && a.status === "Presente")
    .reduce((sum, a) => sum + a.minutesPresent, 0);
}

// Average participation rate: of the trainings an employee attended, what % of the
// total duration did they stay on average. Looks only at "Presente" records, since
// it measures depth of participation rather than attendance frequency (that's the 0-5 score).
// trainingsById maps trainingId -> training (for durationMin lookup).
function averageParticipationPct(employeeId, attendances, trainingsById) {
  const mine = attendances.filter(a => a.employeeId === employeeId && a.status === "Presente");
  if (mine.length === 0) return null;
  const pcts = mine
    .map(a => {
      const training = trainingsById.get(a.trainingId);
      if (!training || !training.durationMin) return null;
      return (a.minutesPresent / training.durationMin) * 100;
    })
    .filter(p => p != null);
  if (pcts.length === 0) return null;
  return pcts.reduce((s, p) => s + p, 0) / pcts.length;
}

   ========================================================= */
function TrainingsPage({ state, setState, pushToast }) {
  const [showUpload, setShowUpload] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [openTraining, setOpenTraining] = useState(null);

  const trainings = useMemo(
    () => [...state.trainings].sort((a, b) => (b.date || "").localeCompare(a.date || "")),
    [state.trainings]
  );

  function statsFor(training) {
    const atts = state.attendances.filter(a => a.trainingId === training.id);
    const presentes = atts.filter(a => a.status === "Presente").length;
    const ausentes = atts.filter(a => a.status === "Ausente" && !a.justified).length;
    const justificados = atts.filter(a => a.status === "Ausente" && a.justified).length;
    const totalMin = atts.reduce((s, a) => s + (a.status === "Presente" ? a.minutesPresent : 0), 0);
    return { total: atts.length, presentes, ausentes, justificados, totalMin };
  }

  function deleteTraining(training) {
    setState(s => ({
      ...s,
      trainings: s.trainings.filter(t => t.id !== training.id),
      attendances: s.attendances.filter(a => a.trainingId !== training.id),
    }));
    pushToast("Treinamento removido.", "success");
    setConfirmDelete(null);
  }

  return (
    <div>
      <div className="page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12 }}>
        <div>
          <h1 className="page-title">Treinamentos</h1>
          <p className="page-desc">Listas de presença importadas, com cálculo automático de horas e status.</p>
        </div>
        <button className="btn btn-primary" onClick={() => setShowUpload(true)}>+ Importar lista de presença</button>
      </div>

      <div className="card">
        {trainings.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">▤</div>
            <h4>Nenhum treinamento registrado</h4>
            <p>Importe uma lista de presença em CSV para começar a calcular indicadores.</p>
            <button className="btn btn-primary" onClick={() => setShowUpload(true)}>Importar lista de presença</button>
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Treinamento</th><th>Data</th><th>Duração</th>
                <th>Presentes</th><th>Ausentes</th><th>Justificados</th>
                <th style={{ width: 140 }}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {trainings.map(t => {
                const st = statsFor(t);
                return (
                  <tr key={t.id} className="row-hover">
                    <td style={{ fontWeight: 600, color: "#121d59" }}>{t.name}</td>
                    <td>{formatDate(t.date)}</td>
                    <td>{minutesToHM(t.durationMin)}</td>
                    <td><span className="badge badge-ok">{st.presentes}</span></td>
                    <td><span className="badge badge-danger">{st.ausentes}</span></td>
                    <td><span className="badge badge-warn">{st.justificados}</span></td>
                    <td>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button className="btn btn-ghost btn-sm" onClick={() => setOpenTraining(t)}>Detalhes</button>
                        <button className="btn btn-danger btn-sm" onClick={() => setConfirmDelete(t)}>Remover</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {showUpload && (
        <UploadAttendanceModal
          state={state}
          setState={setState}
          pushToast={pushToast}
          onClose={() => setShowUpload(false)}
        />
      )}
      {openTraining && (
        <TrainingDetailModal
          training={openTraining}
          state={state}
          setState={setState}
          onClose={() => setOpenTraining(null)}
        />
      )}
      {confirmDelete && (
        <ConfirmModal
          title="Remover treinamento"
          message={`Remover "${confirmDelete.name}"? Todos os registros de presença associados a este treinamento serão removidos.`}
          confirmLabel="Remover"
          danger
          onCancel={() => setConfirmDelete(null)}

      )}

  );
