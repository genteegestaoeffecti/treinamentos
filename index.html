function UploadAttendanceModal({ state, setState, pushToast, onClose }) {
  const [step, setStep] = useState(1);
  const [trainingName, setTrainingName] = useState("");
  const [trainingDate, setTrainingDate] = useState(todayISO());
  const [durationStr, setDurationStr] = useState("");
  const [fileName, setFileName] = useState("");
  const [rows, setRows] = useState([]); // {name, durationRaw}
  const [parseError, setParseError] = useState("");
  const [unmatched, setUnmatched] = useState([]); // names not found exactly in employee base
  const [matchDecisions, setMatchDecisions] = useState({}); // name -> { action: 'link'|'create'|'skip', linkToId, suggestions }

  const durationMin = parseDurationToMinutes(durationStr);

  function handleFile(file) {
    if (!file) return;
    setFileName(file.name);
    setParseError("");
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const allRows = parseCSVText(String(reader.result));
        if (allRows.length === 0) { setParseError("Arquivo vazio ou ilegível."); return; }

        const NAME_HINTS = /^(nome|name|full ?name|participante|colaborador|attendee)s?$/i;
        const DURATION_HINTS = /(tempo de perman|tempo|duration|time in call|duração|permanência|presen)/i;

        // 1) Find the real header row: lines like Meet/Zoom/Read.ai exports start with
        // metadata rows ("* Meet – ...", "Meeting code: ...") before the actual table header.
        let headerIdx = -1;
        let nameColIdx = -1;
        let durationColIdx = -1;
        for (let i = 0; i < Math.min(allRows.length, 15); i++) {
          const cells = allRows[i].map(c => (c || "").toString().trim());
          const nameIdx = cells.findIndex(c => NAME_HINTS.test(c));
          const durIdx = cells.findIndex(c => DURATION_HINTS.test(c) && !NAME_HINTS.test(c));
          if (nameIdx !== -1 && durIdx !== -1) {
            headerIdx = i; nameColIdx = nameIdx; durationColIdx = durIdx;
            break;
          }
        }

        let dataRows;
        if (headerIdx !== -1) {
          // Header row found by column names — use it, regardless of column order.
          dataRows = allRows.slice(headerIdx + 1);
        } else {
          // 2) No recognizable header: fall back to assuming a simple "name, duration" sheet,
          // skipping a plain header line if the first row's first cell looks like "Nome"/"Name".
          nameColIdx = 0;
          durationColIdx = 1;
          const first = (allRows[0][0] || "").toString().trim();
          dataRows = NAME_HINTS.test(first) ? allRows.slice(1) : allRows;
        }

        const FOOTER_JUNK = /^(read\.ai meeting notes|notes by|generated by|total|totais?)$/i;
        const parsed = [];
        for (const r of dataRows) {
          const name = (r[nameColIdx] || "").toString().trim();
          const durRaw = (r[durationColIdx] || "").toString().trim();
          if (!name || FOOTER_JUNK.test(name)) continue;
          parsed.push({ name, durationRaw: durRaw });
        }

        if (parsed.length === 0) {
          setParseError("Não foi possível identificar colunas de nome e tempo de permanência neste arquivo. Verifique se há uma coluna com o nome do participante e outra com o tempo de permanência.");
          setRows([]);
          return;
        }
        setRows(parsed);
      } catch (err) {
        setParseError("Erro ao ler o arquivo: " + err.message);
      }
    };
    reader.onerror = () => setParseError("Não foi possível ler o arquivo selecionado.");
    reader.readAsText(file, "UTF-8");
  }

  function goToReview() {
    if (!trainingName.trim()) { setParseError("Informe o nome do treinamento."); return; }
    if (durationMin <= 0) { setParseError("Informe a duração total do treinamento."); return; }
    if (rows.length === 0) { setParseError("Carregue um arquivo com a lista de presença."); return; }
    setParseError("");
    const existingKeys = new Set(state.employees.map(e => nameKey(e.name)));
    const seen = new Set();
    const missing = [];
    rows.forEach(r => {
      const k = nameKey(r.name);
      if (!existingKeys.has(k) && !seen.has(k)) { missing.push(r.name); seen.add(k); }
    });

    // For each name not found exactly, look for a likely existing match (e.g. "Candice Almeida"
    // vs "Candice Ourique de Almeida") so the person can confirm instead of creating a duplicate.
    const decisions = {};
    missing.forEach(n => {
      const suggestions = findSimilarEmployees(n, state.employees);
      decisions[n] = suggestions.length > 0
        ? { action: "link", linkToId: suggestions[0].employee.id, suggestions }
        : { action: "create", linkToId: null, suggestions: [] };
    });

    setUnmatched(missing);
    setMatchDecisions(decisions);
    setStep(2);
  }

  function setDecision(name, patch) {
    setMatchDecisions(d => ({ ...d, [name]: { ...d[name], ...patch } }));
  }

  function confirmImport() {
    const threshold = state.settings.presenceThresholdPct;
    let employees = [...state.employees];
    const empByKey = new Map(employees.map(e => [nameKey(e.name), e]));
    const uploadNameToEmployeeId = new Map(); // resolves every row's raw name -> employee id

    rows.forEach(r => {
      const k = nameKey(r.name);
      if (empByKey.has(k)) {
        uploadNameToEmployeeId.set(r.name, empByKey.get(k).id);
      }
    });

    unmatched.forEach(n => {
      const decision = matchDecisions[n];
      if (!decision) return;
      if (decision.action === "link" && decision.linkToId) {
        uploadNameToEmployeeId.set(n, decision.linkToId);
      } else if (decision.action === "create") {
        const clean = normalizeName(n);
        const k = nameKey(clean);
        let emp = empByKey.get(k);
        if (!emp) {
          emp = { id: uid("emp"), name: clean, active: true };
          employees.push(emp);
          empByKey.set(k, emp);
        }
        uploadNameToEmployeeId.set(n, emp.id);
      }
      // action === "skip" -> leave unresolved, row will be ignored below
    });

    const trainingId = uid("trn");
    const newTraining = {
      id: trainingId,
      name: trainingName.trim(),
      date: trainingDate,
      durationMin,
      createdAt: Date.now(),
    };

    const newAttendances = [];
    const seenInUpload = new Set();
    rows.forEach(r => {
      const empId = uploadNameToEmployeeId.get(r.name);
      if (!empId) return; // skipped: no decision resolved (e.g. marked "skip")
      if (seenInUpload.has(empId)) return; // avoid double rows for same person in same upload
      seenInUpload.add(empId);
      const minutesPresent = Math.min(parseDurationToMinutes(r.durationRaw), durationMin);
      const status = computeStatus(minutesPresent, durationMin, threshold);
      newAttendances.push({
        id: uid("att"),
        trainingId,
        employeeId: empId,
        minutesPresent,
        status,
        justified: false,
      });
    });

    setState(s => ({
      ...s,
      employees,
      trainings: [...s.trainings, newTraining],
      attendances: [...s.attendances, ...newAttendances],
    }));

    pushToast(`Treinamento "${newTraining.name}" importado com ${newAttendances.length} registro(s).`, "success");
    onClose();
  }

  return (
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ maxWidth: 660 }}>
        <div className="modal-header">
          <h3>Importar lista de presença</h3>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {step === 1 && (
            <div>
              <div className="grid grid-2">
                <div className="field">
                  <label>Nome do treinamento</label>
                  <input type="text" value={trainingName} onChange={e => setTrainingName(e.target.value)} placeholder="Ex: Integração de Novos Colaboradores" />
                </div>
                <div className="field">
                  <label>Data</label>
                  <input type="date" value={trainingDate} onChange={e => setTrainingDate(e.target.value)} />
                </div>
              </div>
              <div className="field">
                <label>Duração total do treinamento</label>
                <input type="text" value={durationStr} onChange={e => setDurationStr(e.target.value)} placeholder="Ex: 90 (minutos), 1:30 ou 1h30" />
                <div className="helper-text">{durationMin > 0 ? `Interpretado como ${minutesToHM(durationMin)}` : "Aceita minutos (90), formato 1:30, 1h30 ou 01:30:00"}</div>
              </div>
              <hr className="divider" />
              <div className="field">
                <label>Arquivo CSV com a lista de presença</label>
                <input type="file" accept=".csv,.txt" onChange={e => handleFile(e.target.files[0])} />
                <div className="helper-text">Detecta automaticamente as colunas de nome e tempo de permanência — funciona com planilhas simples ("Nome, Tempo") e com exportações de Google Meet / Zoom / Read.ai (com cabeçalho "Full Name" / "Time in Call" e metadados extras no topo).</div>
                {fileName && <div className="helper-text">Arquivo: {fileName} · {rows.length} linha(s) lida(s)</div>}
              </div>
              {rows.length > 0 && (
                <div style={{ maxHeight: 160, overflowY: "auto", border: "1px solid var(--line)", borderRadius: 8 }}>
                  <table>
                    <thead><tr><th>Nome</th><th>Tempo (bruto)</th><th>Interpretado</th></tr></thead>
                    <tbody>
                      {rows.slice(0, 50).map((r, i) => (
                        <tr key={i}><td>{r.name}</td><td>{r.durationRaw}</td><td>{minutesToHM(parseDurationToMinutes(r.durationRaw))}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {parseError && <div style={{ color: "var(--danger)", fontSize: 13, marginTop: 10 }}>{parseError}</div>}
            </div>
          )}

          {step === 2 && (
            <div>
              <div className="card-pad" style={{ background: "var(--blizzard-soft)", borderRadius: 8, marginBottom: 16 }}>
                <strong>{trainingName}</strong> · {formatDate(trainingDate)} · {minutesToHM(durationMin)} de duração<br/>
                <span style={{ fontSize: 13, color: "#3a3f4d" }}>{rows.length} registro(s) de presença prontos para importar.</span>
              </div>
              {unmatched.length > 0 ? (
                <div>
                  <label style={{ marginBottom: 10 }}>{unmatched.length} nome(s) sem correspondência exata na base — revise abaixo</label>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 360, overflowY: "auto" }}>
                    {unmatched.map((n, i) => {
                      const decision = matchDecisions[n] || { action: "create", linkToId: null, suggestions: [] };
                      const topSuggestion = decision.suggestions[0];
                      return (
                        <div key={i} style={{ border: "1px solid var(--line)", borderRadius: 8, padding: "10px 12px" }}>
                          <div style={{ fontWeight: 600, color: "var(--midnight)", fontSize: 13.5, marginBottom: 6 }}>{n}</div>
                          {topSuggestion ? (
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              <label style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 500, cursor: "pointer", fontSize: 13 }}>
                                <input
                                  type="radio" name={`decision-${i}`} style={{ width: "auto" }}
                                  checked={decision.action === "link"}
                                  onChange={() => setDecision(n, { action: "link", linkToId: topSuggestion.employee.id })}
                                />
                                É a mesma pessoa que <strong>{topSuggestion.employee.name}</strong> (já cadastrado)
                              </label>
                              <label style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 500, cursor: "pointer", fontSize: 13 }}>
                                <input
                                  type="radio" name={`decision-${i}`} style={{ width: "auto" }}
                                  checked={decision.action === "create"}
                                  onChange={() => setDecision(n, { action: "create", linkToId: null })}
                                />
                                É uma pessoa diferente — adicionar "{n}" como novo colaborador
                              </label>
                              <label style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 500, cursor: "pointer", fontSize: 13 }}>
                                <input
                                  type="radio" name={`decision-${i}`} style={{ width: "auto" }}
                                  checked={decision.action === "skip"}
                                  onChange={() => setDecision(n, { action: "skip", linkToId: null })}
                                />
                                Ignorar este registro
                              </label>
                            </div>
                          ) : (
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              <label style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 500, cursor: "pointer", fontSize: 13 }}>
                                <input
                                  type="radio" name={`decision-${i}`} style={{ width: "auto" }}
                                  checked={decision.action === "create"}
                                  onChange={() => setDecision(n, { action: "create", linkToId: null })}
                                />
                                Adicionar como novo colaborador
                              </label>
                              <label style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 500, cursor: "pointer", fontSize: 13 }}>
                                <input
                                  type="radio" name={`decision-${i}`} style={{ width: "auto" }}
                                  checked={decision.action === "skip"}
                                  onChange={() => setDecision(n, { action: "skip", linkToId: null })}
                                />
                                Ignorar este registro
                              </label>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                  <div className="helper-text" style={{ marginTop: 10 }}>
                    Nomes parecidos (ex: com nome do meio adicionado) são sugeridos automaticamente como possível duplicata. Confirme cada um para evitar colaboradores repetidos na base.
                  </div>
                </div>
              ) : (
                <div className="helper-text">Todos os nomes da lista já constam na base de colaboradores. ✓</div>
              )}
            </div>
          )}
        </div>
        <div className="modal-footer">
          {step === 1 ? (
            <>
              <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" onClick={goToReview}>Revisar importação</button>
            </>
          ) : (
            <>
              <button className="btn btn-ghost" onClick={() => setStep(1)}>Voltar</button>
              <button className="btn btn-primary" onClick={confirmImport}>Confirmar importação</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   ATTENDANCE PAGE — manage Ausente -> Ausente Justificado
   ========================================================= */
function AttendancePage({ state, setState, pushToast }) {
  const [trainingFilter, setTrainingFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");
  const [query, setQuery] = useState("");

  const trainingsById = useMemo(() => {
    const m = new Map();
    state.trainings.forEach(t => m.set(t.id, t));
    return m;
  }, [state.trainings]);

  const rows = useMemo(() => {
    return state.attendances
      .map(a => ({
        ...a,
        employee: state.employees.find(e => e.id === a.employeeId),
        training: trainingsById.get(a.trainingId),
      }))
      .filter(r => r.employee && r.training)
      .filter(r => trainingFilter === "all" || r.trainingId === trainingFilter)
      .filter(r => {
        if (statusFilter === "all") return true;
        const eff = effectiveStatus(r);
        return eff === statusFilter;
      })
      .filter(r => !query || nameKey(r.employee.name).includes(nameKey(query)))
      .sort((a, b) => (b.training.date || "").localeCompare(a.training.date || "") || a.employee.name.localeCompare(b.employee.name, "pt-BR"));
  }, [state.attendances, state.employees, trainingsById, trainingFilter, statusFilter, query]);

  function toggleJustified(attId) {
    setState(s => ({
      ...s,
      attendances: s.attendances.map(a => a.id === attId ? { ...a, justified: !a.justified } : a),
    }));
  }

  return (
    <div>
      <div className="page-header">
        <h1 className="page-title">Presenças</h1>
        <p className="page-desc">Revise registros e marque ausências justificadas manualmente.</p>
      </div>

      <div className="card">
        <div className="card-header" style={{ flexWrap: "wrap", gap: 12 }}>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <select value={trainingFilter} onChange={e => setTrainingFilter(e.target.value)} style={{ width: 220, maxWidth: "100%" }}>
              <option value="all">Todos os treinamentos</option>
              {[...state.trainings].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(t => (
                <option key={t.id} value={t.id}>{t.name} · {formatDate(t.date)}</option>
              ))}
            </select>
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{ width: 200, maxWidth: "100%" }}>
              <option value="all">Todos os status</option>
              <option value="Presente">Presente</option>
              <option value="Ausente">Ausente</option>
              <option value="Ausente Justificado">Ausente Justificado</option>
            </select>
          </div>
          <div className="search-input-wrap">
            <input type="text" placeholder="Buscar colaborador…" value={query} onChange={e => setQuery(e.target.value)} />
          </div>
        </div>
        {rows.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">✓</div>
            <h4>Nenhum registro encontrado</h4>
            <p>Ajuste os filtros ou importe uma lista de presença em Treinamentos.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Colaborador</th><th>Treinamento</th><th>Data</th><th>Tempo presente</th><th>Status</th><th style={{width:170}}>Ação</th></tr>
            </thead>
            <tbody>
              {rows.map(r => {
                const eff = effectiveStatus(r);
                return (
                  <tr key={r.id} className="row-hover">
                    <td>{r.employee.name}</td>
                    <td>{r.training.name}</td>
                    <td>{formatDate(r.training.date)}</td>
                    <td>{minutesToHM(r.minutesPresent)} / {minutesToHM(r.training.durationMin)}</td>
                    <td><span className={"badge " + statusBadgeClass(eff)}>{eff}</span></td>
                    <td>
                      {r.status === "Ausente" && (
                        <button className="btn btn-ghost btn-sm" onClick={() => toggleJustified(r.id)}>
                          {r.justified ? "Remover justificativa" : "Marcar justificado"}
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* =========================================================
   DASHBOARD PAGE
   ========================================================= */
function DashboardPage({ state }) {
  const { employees, trainings, attendances } = state;

  const totalPresentHoursAll = useMemo(
    () => attendances.filter(a => a.status === "Presente").reduce((s, a) => s + a.minutesPresent, 0),
    [attendances]
  );

  const avgScore = useMemo(() => {
    const scores = employees.map(e => computePresenceScore(e.id, attendances)).filter(s => s != null);
    if (scores.length === 0) return null;
    return Math.round((scores.reduce((s, v) => s + v, 0) / scores.length) * 10) / 10;
  }, [employees, attendances]);

  const recentTrainings = useMemo(
    () => [...trainings].sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 5),
    [trainings]
  );

  const lowScoreEmployees = useMemo(() => {
    return employees
      .map(e => ({ employee: e, score: computePresenceScore(e.id, attendances) }))
      .filter(x => x.score != null)
      .sort((a, b) => a.score - b.score)
      .slice(0, 5);
  }, [employees, attendances]);

  function statsFor(training) {
    const atts = attendances.filter(a => a.trainingId === training.id);
    const presentes = atts.filter(a => a.status === "Presente").length;
    return { total: atts.length, presentes };
  }

  return (
    <div>
      <div className="page-header">
        <h1 className="page-title">Visão geral</h1>
        <p className="page-desc">Resumo do controle de presença em treinamentos internos.</p>
      </div>

      <div className="grid grid-4" style={{ marginBottom: 24 }}>
        <div className="kpi">
          <div className="kpi-label">Colaboradores</div>
          <div className="kpi-value">{employees.length}</div>
          <div className="kpi-sub">na base ativa</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Treinamentos</div>
          <div className="kpi-value">{trainings.length}</div>
          <div className="kpi-sub">registrados</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Horas treinadas</div>
          <div className="kpi-value">{minutesToHM(totalPresentHoursAll)}</div>
          <div className="kpi-sub">acumuladas (presenças)</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Indicador médio</div>
          <div className="kpi-value" style={{ color: scoreColor(avgScore) }}>{avgScore != null ? avgScore.toFixed(1) : "—"}<span style={{fontSize:14, color:"#5a6072", fontWeight:600}}> / 5</span></div>
          <div className="kpi-sub">presença geral da equipe</div>
        </div>
      </div>

      <div className="grid grid-2">
        <div className="card">
          <div className="card-header"><h3>Treinamentos recentes</h3></div>
          {recentTrainings.length === 0 ? (
            <div className="empty"><p style={{margin:0}}>Nenhum treinamento importado ainda.</p></div>
          ) : (
            <table>
              <thead><tr><th>Nome</th><th>Data</th><th>Presença</th></tr></thead>
              <tbody>
                {recentTrainings.map(t => {
                  const st = statsFor(t);
                  return (
                    <tr key={t.id}>
                      <td>{t.name}</td>
                      <td>{formatDate(t.date)}</td>
                      <td>{st.presentes}/{st.total}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>

        <div className="card">
          <div className="card-header"><h3>Atenção: menor indicador de presença</h3></div>
          {lowScoreEmployees.length === 0 ? (
            <div className="empty"><p style={{margin:0}}>Sem dados suficientes ainda.</p></div>
          ) : (
            <table>
              <thead><tr><th>Colaborador</th><th>Indicador</th></tr></thead>
              <tbody>
                {lowScoreEmployees.map(x => (
                  <tr key={x.employee.id}>
                    <td>{x.employee.name}</td>
                    <td>
                      <span className="score-ring" style={{ background: scoreColor(x.score) }}>{x.score.toFixed(1)}</span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

  const [tab, setTab] = useState("employee"); // employee | period | training
  const [showExport, setShowExport] = useState(false);
  const { employees, trainings, attendances } = state;

  return (
    <div>
      <div className="page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12 }}>
        <div>
          <h1 className="page-title">Indicadores</h1>
          <p className="page-desc">Horas de treinamento e presença, sob diferentes recortes.</p>
        </div>
        <button className="btn btn-primary" onClick={() => setShowExport(true)}>Exportar relatório</button>
      </div>

      <div className="tabs">

        <button className={"tab" + (tab === "period" ? " active" : "")} onClick={() => setTab("period")}>Por período</button>

function ReportByEmployee({ employees, attendances }) {
  const [query, setQuery] = useState("");
  const [sortKey, setSortKey] = useState("score");

  const rows = useMemo(() => {
    let list = employees.map(e => {
      const mine = attendances.filter(a => a.employeeId === e.id);
      const presentes = mine.filter(a => a.status === "Presente").length;
      const ausentes = mine.filter(a => a.status === "Ausente" && !a.justified).length;
      const justificados = mine.filter(a => a.status === "Ausente" && a.justified).length;
      const totalMin = totalMinutesForEmployee(e.id, attendances);
      const score = computePresenceScore(e.id, attendances);
      return { employee: e, total: mine.length, presentes, ausentes, justificados, totalMin, score };
    }).filter(r => !query || nameKey(r.employee.name).includes(nameKey(query)));

    const cmp = {
      score: (a, b) => (b.score ?? -1) - (a.score ?? -1),
      hours: (a, b) => b.totalMin - a.totalMin,
      name: (a, b) => a.employee.name.localeCompare(b.employee.name, "pt-BR"),
    }[sortKey];
    return list.sort(cmp);
  }, [employees, attendances, query, sortKey]);

  return (
    <div className="card">
      <div className="card-header" style={{ flexWrap: "wrap", gap: 12 }}>
        <div>
          <h3>Horas e indicador por colaborador</h3>
          <div className="hint">{rows.length} colaborador(es)</div>
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <select value={sortKey} onChange={e => setSortKey(e.target.value)} style={{ width: 200, maxWidth: "100%" }}>
            <option value="score">Ordenar por indicador</option>
            <option value="hours">Ordenar por horas</option>
            <option value="name">Ordenar por nome</option>
          </select>
          <input type="text" placeholder="Buscar…" value={query} onChange={e => setQuery(e.target.value)} style={{ width: 200, maxWidth: "100%" }} />
        </div>
      </div>
      {rows.length === 0 ? (
        <div className="empty"><p style={{margin:0}}>Sem colaboradores cadastrados.</p></div>
      ) : (
        <table>
          <thead>
            <tr><th>Colaborador</th><th>Treinamentos</th><th>Presentes</th><th>Ausentes</th><th>Justificados</th><th>Horas treinadas</th><th>Indicador (0–5)</th></tr>
          </thead>
          <tbody>
            {rows.map(r => (
              <tr key={r.employee.id} className="row-hover">
                <td>{r.employee.name}</td>
                <td>{r.total}</td>
                <td>{r.presentes}</td>
                <td>{r.ausentes}</td>
                <td>{r.justificados}</td>
                <td>{minutesToHM(r.totalMin)}</td>
                <td>
                  {r.score != null ? (
                    <span className="score-ring" style={{ background: scoreColor(r.score) }}>{r.score.toFixed(1)}</span>
                  ) : <span style={{ color: "#9aa0ad" }}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

function ReportByPeriod({ trainings, attendances }) {
  const [granularity, setGranularity] = useState("month"); // month | training-date list

  const grouped = useMemo(() => {
    const map = new Map(); // key -> { label, minutes, trainingsSet }
    trainings.forEach(t => {
      if (!t.date) return;
      const key = granularity === "month" ? t.date.slice(0, 7) : t.date;
      const label = granularity === "month"
        ? new Date(t.date + "T00:00:00").toLocaleDateString("pt-BR", { month: "long", year: "numeric" })
        : formatDate(t.date);
      const minutes = attendances.filter(a => a.trainingId === t.id && a.status === "Presente").reduce((s, a) => s + a.minutesPresent, 0);
      const presentCount = attendances.filter(a => a.trainingId === t.id && a.status === "Presente").length;
      if (!map.has(key)) map.set(key, { key, label, minutes: 0, trainingsCount: 0, presentCount: 0 });
      const entry = map.get(key);
      entry.minutes += minutes;
      entry.trainingsCount += 1;
      entry.presentCount += presentCount;
    });
    return [...map.values()].sort((a, b) => b.key.localeCompare(a.key));
  }, [trainings, attendances, granularity]);

  const maxMinutes = Math.max(1, ...grouped.map(g => g.minutes));

  return (
    <div className="card">
      <div className="card-header">
        <div>
          <h3>Horas de treinamento por período</h3>
          <div className="hint">Soma das horas presenciadas (não conta ausências) por {granularity === "month" ? "mês" : "data de treinamento"}</div>
        </div>
        <select value={granularity} onChange={e => setGranularity(e.target.value)} style={{ width: 180 }}>
          <option value="month">Agrupar por mês</option>
          <option value="date">Agrupar por data</option>
        </select>
      </div>
      {grouped.length === 0 ? (
        <div className="empty"><p style={{margin:0}}>Nenhum treinamento com data registrada.</p></div>
      ) : (
        <div className="card-pad">
          {grouped.map(g => (
            <div key={g.key} style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, marginBottom: 6 }}>
                <span style={{ fontWeight: 600, color: "var(--midnight)", textTransform: "capitalize" }}>{g.label}</span>
                <span style={{ color: "var(--text-soft)" }}>{minutesToHM(g.minutes)} · {g.trainingsCount} treinamento(s)</span>
              </div>
              <div className="bar-track">
                <div className="bar-fill" style={{ width: `${(g.minutes / maxMinutes) * 100}%` }}></div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ReportByTraining({ trainings, attendances }) {
  const rows = useMemo(() => {
    return [...trainings].map(t => {
      const atts = attendances.filter(a => a.trainingId === t.id);
      const presentes = atts.filter(a => a.status === "Presente").length;
      const ausentes = atts.filter(a => a.status === "Ausente" && !a.justified).length;
      const justificados = atts.filter(a => a.status === "Ausente" && a.justified).length;
      const totalMin = atts.filter(a => a.status === "Presente").reduce((s, a) => s + a.minutesPresent, 0);
      return { training: t, total: atts.length, presentes, ausentes, justificados, totalMin };
    }).sort((a, b) => (b.training.date || "").localeCompare(a.training.date || ""));
  }, [trainings, attendances]);

  return (
    <div className="card">
      <div className="card-header">
        <div>
          <h3>Horas por treinamento</h3>
          <div className="hint">Total de horas presenciadas e taxa de presença por treinamento</div>
        </div>
      </div>
      {rows.length === 0 ? (
        <div className="empty"><p style={{margin:0}}>Nenhum treinamento registrado ainda.</p></div>
      ) : (
        <table>
          <thead>
            <tr><th>Treinamento</th><th>Data</th><th>Duração</th><th>Participantes</th><th>Taxa de presença</th><th>Horas totais (presenças)</th></tr>
          </thead>
          <tbody>
            {rows.map(r => {
              const rate = r.total > 0 ? Math.round((r.presentes / r.total) * 100) : 0;
              return (
                <tr key={r.training.id} className="row-hover">
                  <td style={{ fontWeight: 600, color: "var(--gulf-blue)" }}>{r.training.name}</td>
                  <td>{formatDate(r.training.date)}</td>
                  <td>{minutesToHM(r.training.durationMin)}</td>
                  <td>{r.total}</td>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div className="bar-track" style={{ width: 70 }}><div className="bar-fill" style={{ width: `${rate}%` }}></div></div>
                      <span>{rate}%</span>
                    </div>
                  </td>
                  <td>{minutesToHM(r.totalMin)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

/* =========================================================
   SETTINGS PAGE
   ========================================================= */
function SettingsPage({ state, setState, pushToast }) {
  const [threshold, setThreshold] = useState(state.settings.presenceThresholdPct);

  function save() {
    const v = Math.max(1, Math.min(100, Number(threshold) || 75));
    setState(s => ({ ...s, settings: { ...s.settings, presenceThresholdPct: v } }));
    pushToast("Configurações salvas.", "success");
  }

  return (
    <div>
      <div className="page-header">
        <h1 className="page-title">Configurações</h1>
        <p className="page-desc">Regras de cálculo usadas no sistema.</p>
      </div>

      <div className="card" style={{ maxWidth: 520 }}>
        <div className="card-header"><h3>Critério de presença</h3></div>
        <div className="card-pad">
          <div className="field">
            <label>Percentual mínimo de permanência para contar como "Presente"</label>
            <input type="number" min="1" max="100" value={threshold} onChange={e => setThreshold(e.target.value)} />
            <div className="helper-text">
              Um colaborador é considerado <strong>Presente</strong> se permaneceu pelo menos {threshold}% da duração total do treinamento.
              Abaixo disso, é classificado como <strong>Ausente</strong> (podendo depois ser marcado como Ausente Justificado).
            </div>
          </div>
          <button className="btn btn-primary" onClick={save}>Salvar</button>
        </div>
      </div>

      <div className="card" style={{ maxWidth: 520, marginTop: 20 }}>
        <div className="card-header"><h3>Sobre o indicador de presença</h3></div>
        <div className="card-pad" style={{ fontSize: 13.5, color: "var(--text-soft)", lineHeight: 1.7 }}>
          O indicador (0 a 5) é calculado como: <br/>
          <code style={{ background: "var(--merino)", padding: "2px 6px", borderRadius: 4 }}>
            (treinamentos com presença ÷ total de treinamentos) × 5
          </code>
          <br/><br/>
          Esse cálculo considera todo o histórico de presenças e ausências registradas até o momento, por colaborador.
        </div>
      </div>
    </div>
  );
}
